name: Java CI with Gradle (Kotlin DSL)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # Checkout the repository
      - uses: actions/checkout@v4

      # Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Setup Gradle with caching
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false
          
      # Make Gradle Wrapper executable
      - name: Make Gradle Wrapper executable
        run: chmod +x gradlew

      # Build project and run tests
      - name: Build with Gradle Wrapper
        run: ./gradlew build

      # Upload desktop runnable jar
      - name: Upload artifact JAR
        uses: actions/upload-artifact@v4
        with:
          name: tinyblox-jar
          path: lwjgl3/build/libs/*.jar
      
      # Upload distributions
      - name: Upload game distributions
        uses: actions/upload-artifact@v4
        with:
          name: tinyblox-distributions
          path: lwjgl3/build/distributions/*
          
